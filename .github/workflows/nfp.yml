name: NFP Analysis
on:
  schedule:
    - cron: '35 12 1-7 * *'
    - cron: '35 13 1-7 * *'
  workflow_dispatch:
concurrency:
  group: nfp-analysis
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Check if today is Friday
      id: check_friday
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "should_run=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        DOW=$(date -u +%u)
        if [ "$DOW" = "5" ]; then
          echo "should_run=true" >> $GITHUB_OUTPUT
        else
          echo "should_run=false" >> $GITHUB_OUTPUT
        fi
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: python nfp_analysis.py
      env:
        BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        LAST_NFP_STATUS: ${{ vars.LAST_NFP_STATUS }}
        LAST_CPI_STATUS: ${{ vars.LAST_CPI_STATUS }}
    - run: |
        for f in nfp_*.json; do
          [ -f "$f" ] || continue
          curl -s -X PUT "https://api.github.com/repos/Pixel6068/autoclaw-inbox/contents/data/nfp_${{ github.run_id }}.json"             -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}"             -H "Accept: application/vnd.github+json"             -d "$(python3 -c "import json; d=open('$f').read(); import base64; print(json.dumps({'message':'nfp ${{ github.run_id }}','content':base64.b64encode(d.encode()).decode()}))")" || true
        done