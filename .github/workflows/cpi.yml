name: CPI Analysis
on:
  schedule:
    - cron: '35 12 1-7 * *'
    - cron: '35 13 1-7 * *'
  workflow_dispatch:
concurrency:
  group: cpi-analysis
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: python nfp_analysis.py
      env:
        BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        LAST_NFP_STATUS: ${{ vars.LAST_NFP_STATUS }}
        LAST_CPI_STATUS: ${{ vars.LAST_CPI_STATUS }}
    - name: Push to AutoClaw
      run: |
        gh api -X PUT repos/Pixel6068/autoclaw-inbox/contents/data/cpi_${{ github.run_id }}.json           -f message="nfp ${{ github.run_id }}"           -f content="$(base64 < cpi_result.json)"
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
    - name: Notify on failure
      if: failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage"           -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}"           -d parse_mode=Markdown           --data-urlencode "text=🚨 CPI workflow failed" || true