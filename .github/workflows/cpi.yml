name: CPI Analysis

on:
  schedule:
    # CPI 发布: 每月 10-13 号 8:30 AM ET
    # 8:35 ET = 12:35 UTC (夏令时 EDT) / 13:35 UTC (冬令时 EST)
    # 用 day-of-month 10-15 给 BLS 发布日期的冗余窗口
    - cron: '35 12 10-15 * *'
    - cron: '35 13 10-15 * *'
  workflow_dispatch:

# 同一时间只跑一个，避免双触发
concurrency:
  group: cpi-analysis
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify required secrets
        run: |
          missing=()
          [ -z "${{ secrets.BLS_API_KEY }}" ] && missing+=("BLS_API_KEY")
          [ -z "${{ secrets.TELEGRAM_TOKEN }}" ] && missing+=("TELEGRAM_TOKEN")
          [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ] && missing+=("TELEGRAM_CHAT_ID")
          [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${{ secrets.PAT_TOKEN }}" ] && missing+=("PAT_TOKEN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ 缺失 secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ 所有 secrets 已配置"

      - name: Run CPI analysis
        run: python cpi_analysis.py
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 用 PAT 替代默认 GITHUB_TOKEN，因为默认 token 无法写 Variables
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          LAST_NFP_STATUS: ${{ vars.LAST_NFP_STATUS }}
          LAST_CPI_STATUS: ${{ vars.LAST_CPI_STATUS }}

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="🚨 *CPI workflow 失败* | 日志: $RUN_URL"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode=Markdown \
            --data-urlencode "text=$MSG" || true
