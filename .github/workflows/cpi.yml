name: CPI Analysis
on:
  schedule:
  - cron: '35 12 10-15 * *'
  - cron: '35 13 10-15 * *'
  workflow_dispatch:
concurrency:
  group: cpi-analysis
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Verify required secrets
      run: |
        missing=()
        [ -z "${{ secrets.BLS_API_KEY }}" ] && missing+=("BLS_API_KEY")
        [ -z "${{ secrets.TELEGRAM_TOKEN }}" ] && missing+=("TELEGRAM_TOKEN")
        [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ] && missing+=("TELEGRAM_CHAT_ID")
        [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && missing+=("ANTHROPIC_API_KEY")
        [ -z "${{ secrets.PAT_TOKEN }}" ] && missing+=("PAT_TOKEN")
        if [ ${#missing[@]} -ne 0 ]; then echo "Missing: ${missing[*]}"; exit 1; fi
    - name: Run CPI analysis
      run: python cpi_analysis.py
      env:
        BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        LAST_NFP_STATUS: ${{ vars.LAST_NFP_STATUS }}
        LAST_CPI_STATUS: ${{ vars.LAST_CPI_STATUS }}
    - name: Push results to AutoClaw
      if: success()
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git clone https://x-access-token:${PAT_TOKEN}@github.com/Pixel6068/autoclaw-inbox.git /tmp/inbox
        cp cpi_*.json /tmp/inbox/data/ 2>/dev/null || true
        cd /tmp/inbox && git config user.email "bot@local" && git config user.name "Bot"
        git add data/ && git commit -m "cpi ${{ github.run_id }}" || true && git push
    - name: Notify on failure
      if: failure()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d parse_mode=Markdown --data-urlencode "text=🚨 CPI workflow failed | Log: ${RUN_URL}" || true
